services:
  app:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped

  mcp-admin:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
      GRAPH_CORE_URL: http://app:8001
      GRAPH_CORE_ADMIN_MCP_PORT: 18102
    command: ["graph-core-admin-mcp"]
    ports:
      - "18102:18102"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  mcp-user:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
      GRAPH_CORE_URL: http://app:8001
      GRAPH_CORE_USER_MCP_PORT: 18103
    command: ["graph-core-user-mcp"]
    ports:
      - "18103:18103"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
    command: ["dramatiq", "graph_core.workers", "--processes", "4", "--threads", "8"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: graphcore
      POSTGRES_PASSWORD: graphcore
      POSTGRES_DB: graphcore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphcore -d graphcore"]
      interval: 5s
      timeout: 5s
      retries: 10

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3001:3000"
    environment:
      REDIS_ARGS: "--appendonly yes --aclfile /var/lib/falkordb/data/users.acl"
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  falkordb_data:
  redis_data:
