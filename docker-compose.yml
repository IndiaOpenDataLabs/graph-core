services:
  app:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://graphcore:graphcore@postgres:5432/graphcore
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: falkordb://falkordb:6379
      REDIS_SEMAPHORE_URL: redis://redis:6379/0
    command: ["dramatiq", "graph_core.workers", "--processes", "4", "--threads", "8"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: graphcore
      POSTGRES_PASSWORD: graphcore
      POSTGRES_DB: graphcore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphcore -d graphcore"]
      interval: 5s
      timeout: 5s
      retries: 10

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3001:3000"
    environment:
      FALKORDB_AOF: "yes"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  falkordb_data:
  redis_data:
